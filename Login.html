<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Path2Skill</title>

    <!-- Google Fonts (same as your main file) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --baby-blue: #E6F0FF;
            --dark-baby-blue: #4171b9;   
            --hover-blue: #36517a;         
            --white: #FFFFFF;
            --text-dark: #1E293B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #ffffff, #e0ecff);
    display: flex;
    align-items: center;
    justify-content: center;

    background-size: 200% 200%;
    animation: bgShift 10s ease infinite;
}

@keyframes bgShift {
    0% { background-position: left; }
    50% { background-position: right; }
    100% { background-position: left; }
}

        .login-container {
    background: var(--white);
    padding: 2.5rem;
    border-radius: 1rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;

    /* NEW */
    opacity: 0;
    transform: translateY(20px) scale(0.98);
    animation: cardEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes cardEnter {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

        .login-container h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-bottom: 1.5rem;
            color: var(--dark-baby-blue);
             opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.3s ease forwards 0.1s;
        }

        .input-group {
    position: relative;
    margin-bottom: 1.5rem;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.2s ease forwards;
}
.input-group:nth-child(1) { animation-delay: 0.2s; }
.input-group:nth-child(2) { animation-delay: 0.3s; }


.input-group input {
    width: 100%;
    padding: 1rem 0.75rem 0.4rem;
    border: 1px solid #ccc;
    border-radius: 0.5rem;
    font-size: 0.95rem;
    background: transparent;
}

/* Move label inside */
.input-group label {
    position: absolute;
    left: 0.75rem;
    top: 0.9rem;
    font-size: 0.9rem;
    color: #64748B;
    pointer-events: none;
    transition: 0.15s ease;
    background: white;
    padding: 0 4px;
}

/* When typing or focused */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -0.45rem;
    font-size: 0.7rem;
    color: var(--dark-baby-blue);
}
       .input-group input:focus {
    outline: none;
    border-color: var(--dark-baby-blue);
    box-shadow: 0 0 0 4px rgba(65, 113, 185, 0.15);
    transition: all 0.15s ease;
}

    .login-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--dark-baby-blue);
    color: #ffffff;
    border: none;
    border-radius: 0.5rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;

    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
     opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.3s ease forwards 0.2s;
}
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


.login-btn:hover {
    background: var(--hover-blue);
      transform: translateY(-2px) scale(1.01);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}
 .login-btn:active {
    transform: translateY(0) scale(0.98);
}
        .extra-links {
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .extra-links a {
            color: var(--dark-baby-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dark);
            text-decoration: none;
        }

        .back-home:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome Back</h2>

        <form onsubmit="redirectToWelcome(event)">
           <div class="input-group">
        <input type="email" placeholder=" " required>
        <label>Email</label>
        </div>

           <div class="input-group">
    <input type="password" placeholder=" " required>
    <label>Password</label>
</div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="extra-links">
            
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>

        <a href="CSMainPage.html" class="back-home">← Home Page</a>
    </div>
    <script>
function redirectToWelcome(event) {
    event.preventDefault();

    const email = document.querySelector("input[type='email']").value;

    // Extract name from email (before @)
    const name = email.split("@")[0];

    localStorage.setItem("userName", name);

    window.location.href = "loginWelcome.html";
}
</script>

</body>
</html>
